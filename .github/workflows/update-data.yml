name: Update Hydrological Data

on:
  schedule:
    # 每6小时运行一次 (UTC时间)
    - cron: '0 */6 * * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      force_update:
        description: '强制更新所有数据'
        required: false
        default: 'false'
        type: boolean

  # 当数据文件被修改时触发
  push:
    paths:
      - 'scripts/update-data.py'
      - 'data/sources/**'

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt
      
      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
      
      - name: Run data update script
        env:
          FORCE_UPDATE: ${{ github.event.inputs.force_update || 'false' }}
        run: |
          echo "Running data update script..."
          python scripts/update-data.py
      
      - name: Check for changes
        id: git-check
        run: |
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git add data/
          git commit -m "📊 Update hydrological data [skip ci]"
          git push
      
      - name: No changes message
        if: steps.git-check.outputs.changes == 'false'
        run: echo "No data changes to commit"
      
      - name: Update deployment status
        run: |
          echo "Data update completed at $(date)"
          echo "Last run: $(date)" > data/update-status.txt
          git add data/update-status.txt
          git commit -m "Update status timestamp" || echo "No status changes"
          git push || echo "Push failed, but that's OK"