<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水文监测系统 - 紧急修复版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* 紧急修复版样式 - 确保100%工作 */
        :root {
            --bg-primary: #0a1a2d;
            --bg-card: #1a2b3c;
            --text-primary: #ffffff;
            --text-secondary: #8c98a4;
            --primary-color: #1890ff;
            --border-color: rgba(140, 152, 164, 0.2);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }
        
        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: var(--text-secondary);
        }
        
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .chart-container {
            height: 400px;
            width: 100%;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        
        th {
            background: rgba(26, 43, 60, 0.8);
            font-weight: 600;
        }
        
        tr:hover {
            background: rgba(24, 144, 255, 0.05);
        }
        
        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            text-align: center;
        }
        
        .loading { background: rgba(250, 173, 20, 0.1); color: #faad14; border: 1px solid rgba(250, 173, 20, 0.3); }
        .success { background: rgba(82, 196, 26, 0.1); color: #52c41a; border: 1px solid rgba(82, 196, 26, 0.3); }
        .error { background: rgba(255, 77, 79, 0.1); color: #ff4d4f; border: 1px solid rgba(255, 77, 79, 0.3); }
        
        .controls {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        select, button {
            padding: 10px 15px;
            background: rgba(26, 43, 60, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            color: var(--text-primary);
            cursor: pointer;
        }
        
        button.primary {
            background: rgba(24, 144, 255, 0.1);
            border-color: rgba(24, 144, 255, 0.3);
            color: var(--primary-color);
        }
        
        button:hover {
            background: rgba(26, 43, 60, 0.9);
        }
        
        button.primary:hover {
            background: rgba(24, 144, 255, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-water"></i> 水文监测分析系统</h1>
            <div class="subtitle">紧急修复版 - 确保数据展示</div>
            <div id="systemStatus" class="status loading">正在初始化...</div>
        </header>
        
        <div class="card">
            <h2><i class="fas fa-chart-line"></i> 数据趋势图</h2>
            <div class="controls">
                <select id="reservoirSelect">
                    <option value="">选择水库...</option>
                </select>
                <select id="indicatorSelect">
                    <option value="water_level">水位</option>
                    <option value="inflow">入库流量</option>
                    <option value="outflow">出库流量</option>
                </select>
                <button class="primary" onclick="loadData()"><i class="fas fa-sync"></i> 加载数据</button>
            </div>
            <div id="chart" class="chart-container"></div>
            <div id="chartStatus" class="status loading">准备图表...</div>
        </div>
        
        <div class="card">
            <h2><i class="fas fa-table"></i> 监测数据</h2>
            <div id="tableStatus" class="status loading">加载数据...</div>
            <table>
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>水库</th>
                        <th>水位(m)</th>
                        <th>入库流量(m³/s)</th>
                        <th>出库流量(m³/s)</th>
                    </tr>
                </thead>
                <tbody id="dataTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        // 紧急修复版 - 最简单的实现，确保100%工作
        console.log('紧急修复版启动...');
        
        // 数据URL
        const DATA_URLS = {
            reservoirs: 'data/reservoirs.json',
            timeSeries: 'data/time_series.json',
            summary: 'data/summary.json'
        };
        
        // 全局状态
        let chartInstance = null;
        let currentData = null;
        
        // 更新状态显示
        function updateStatus(elementId, message, type) {
            const element = document.getElementById(elementId);
            if (element) {
                element.textContent = message;
                element.className = `status ${type}`;
            }
        }
        
        // 加载数据
        async function loadData() {
            console.log('开始加载数据...');
            updateStatus('systemStatus', '正在加载数据...', 'loading');
            updateStatus('chartStatus', '准备图表数据...', 'loading');
            updateStatus('tableStatus', '加载表格数据...', 'loading');
            
            try {
                // 加载水库数据
                const reservoirs = await loadJson(DATA_URLS.reservoirs);
                updateStatus('systemStatus', `已加载 ${reservoirs.count} 个水库`, 'success');
                
                // 更新水库选择
                updateReservoirSelect(reservoirs.reservoirs);
                
                // 加载时间序列数据
                const timeSeries = await loadJson(DATA_URLS.timeSeries);
                updateStatus('tableStatus', `已加载 ${timeSeries.count} 条记录`, 'success');
                
                // 保存数据
                currentData = timeSeries;
                
                // 渲染表格
                renderTable(timeSeries.data);
                
                // 渲染图表
                renderChart(timeSeries.data);
                
                updateStatus('systemStatus', '数据加载完成', 'success');
                
            } catch (error) {
                console.error('数据加载失败:', error);
                updateStatus('systemStatus', `加载失败: ${error.message}`, 'error');
                updateStatus('chartStatus', '图表加载失败', 'error');
                updateStatus('tableStatus', '表格加载失败', 'error');
                
                // 使用模拟数据
                useMockData();
            }
        }
        
        // 加载JSON数据
        async function loadJson(url) {
            console.log(`加载: ${url}`);
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            return await response.json();
        }
        
        // 更新水库选择
        function updateReservoirSelect(reservoirs) {
            const select = document.getElementById('reservoirSelect');
            if (!select || !reservoirs) return;
            
            // 清空现有选项（除了第一个）
            while (select.options.length > 1) {
                select.remove(1);
            }
            
            // 添加水库选项
            reservoirs.forEach(reservoir => {
                const option = document.createElement('option');
                option.value = reservoir.name;
                option.textContent = reservoir.name;
                select.appendChild(option);
            });
        }
        
        // 渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('dataTable');
            if (!tbody || !data) return;
            
            // 显示最新20条数据
            const displayData = data.slice(0, 20);
            
            tbody.innerHTML = displayData.map(item => `
                <tr>
                    <td>${formatTime(item.time)}</td>
                    <td>${item.reservoir || '未知'}</td>
                    <td>${item.water_level?.toFixed(1) || '0.0'}</td>
                    <td>${item.inflow?.toFixed(1) || '0.0'}</td>
                    <td>${item.outflow?.toFixed(1) || '0.0'}</td>
                </tr>
            `).join('');
        }
        
        // 渲染图表
        function renderChart(data) {
            const chartDom = document.getElementById('chart');
            if (!chartDom || !data || typeof echarts === 'undefined') {
                updateStatus('chartStatus', '图表库未加载', 'error');
                return;
            }
            
            try {
                // 初始化图表
                if (!chartInstance) {
                    chartInstance = echarts.init(chartDom);
                }
                
                // 按水库分组数据
                const reservoirs = [...new Set(data.map(d => d.reservoir))];
                const selectedReservoir = document.getElementById('reservoirSelect').value;
                const selectedIndicator = document.getElementById('indicatorSelect').value;
                
                // 准备图表数据
                const series = [];
                const xAxisData = [];
                
                // 获取第一个水库的数据作为示例
                const sampleData = data.filter(d => 
                    !selectedReservoir || d.reservoir === selectedReservoir
                ).slice(0, 50); // 限制数据点数量
                
                if (sampleData.length > 0) {
                    // 提取时间和指标数据
                    sampleData.forEach((item, index) => {
                        xAxisData.push(formatTime(item.time));
                    });
                    
                    // 为每个水库创建系列
                    reservoirs.forEach(reservoir => {
                        const reservoirData = sampleData.filter(d => d.reservoir === reservoir);
                        if (reservoirData.length > 0) {
                            series.push({
                                name: reservoir,
                                type: 'line',
                                data: reservoirData.map(d => d[selectedIndicator] || 0),
                                smooth: true,
                                lineStyle: { width: 3 },
                                symbolSize: 6
                            });
                        }
                    });
                }
                
                // 图表配置
                const option = {
                    backgroundColor: 'transparent',
                    tooltip: {
                        trigger: 'axis',
                        backgroundColor: 'rgba(26, 43, 60, 0.95)',
                        borderColor: 'rgba(24, 144, 255, 0.3)',
                        textStyle: { color: '#ffffff' }
                    },
                    legend: {
                        data: reservoirs,
                        textStyle: { color: var(--text-secondary) },
                        top: 10
                    },
                    xAxis: {
                        type: 'category',
                        data: xAxisData,
                        axisLine: { lineStyle: { color: var(--border-color) } },
                        axisLabel: { color: var(--text-secondary) }
                    },
                    yAxis: {
                        type: 'value',
                        axisLine: { lineStyle: { color: var(--border-color) } },
                        axisLabel: { color: var(--text-secondary) },
                        splitLine: { lineStyle: { color: 'rgba(140, 152, 164, 0.1)' } }
                    },
                    series: series,
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: '3%',
                        top: '15%',
                        containLabel: true
                    }
                };
                
                // 设置图表选项
                chartInstance.setOption(option);
                updateStatus('chartStatus', '图表渲染完成', 'success');
                
                // 响应窗口大小变化
                window.addEventListener('resize', () => {
                    chartInstance.resize();
                });
                
            } catch (error) {
                console.error('图表渲染失败:', error);
                updateStatus('chartStatus', `图表错误: ${error.message}`, 'error');
            }
        }
        
        // 使用模拟数据
        function useMockData() {
            console.log('使用模拟数据...');
            
            const mockReservoirs = {
                reservoirs: [
                    { name: '宝珠寺水库', basin: '嘉陵江流域' },
                    { name: '紫坪铺水库', basin: '岷江流域' },
                    { name: '亭子口水库', basin: '嘉陵江流域' }
                ],
                count: 3
            };
            
            const mockTimeSeries = {
                data: [
                    { time: '2026-03-30T10:00:00Z', reservoir: '宝珠寺水库', water_level: 512.5, inflow: 125.3, outflow: 98.7 },
                    { time: '2026-03-30T11:00:00Z', reservoir: '宝珠寺水库', water_level: 513.2, inflow: 128.1, outflow: 102.4 },
                    { time: '2026-03-30T10:00:00Z', reservoir: '紫坪铺水库', water_level: 845.3, inflow: 85.6, outflow: 72.1 },
                    { time: '2026-03-30T11:00:00Z', reservoir: '紫坪铺水库', water_level: 846.1, inflow: 87.2, outflow: 74.3 },
                    { time: '2026-03-30T10:00:00Z', reservoir: '亭子口水库', water_level: 623.4, inflow: 210.5, outflow: 195.8 }
                ],
                count: 5
            };
            
            updateReservoirSelect(mockReservoirs.reservoirs);
            renderTable(mockTimeSeries.data);
            
            if (typeof echarts !== 'undefined') {
                renderChart(mockTimeSeries.data);
            }
            
            updateStatus('systemStatus', '正在使用模拟数据', 'warning');
            updateStatus('chartStatus', '模拟数据图表', 'warning');
            updateStatus('tableStatus', '模拟数据表格', 'warning');
        }
        
        // 格式化时间
        function formatTime(isoString) {
            try {
                const date = new Date(isoString);
                return date.toLocaleTimeString('zh-CN', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    hour12: false 
                });
            } catch {
                return isoString;
            }
        }
        
        // 页面加载完成后自动加载数据
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM加载完成，开始加载数据...');
            
            // 检查ECharts
            if (typeof echarts === 'undefined') {
                updateStatus('systemStatus', '图表库加载失败，使用表格模式', 'warning');
            }
            
            // 自动加载数据
            setTimeout(() => loadData(), 1000);
            
            // 绑定选择器变化事件
            document.getElementById('reservoirSelect').addEventListener('change', () => {
                if (currentData) {
                    renderChart(currentData.data);
                }
            });
            
            document.getElementById('indicatorSelect').addEventListener('change', () => {
                if (currentData) {
                    renderChart(currentData.data);
                }
            });
        });
        
        // 导出到全局
        window.loadData = loadData;
        window.useMockData = useMockData;
    </script>
</body>
</html>
